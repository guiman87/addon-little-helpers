<style>
#mobile-toolbar { display: none; }
@media (pointer: coarse), (max-width: 800px) {
  #mobile-toolbar {
    display: flex;
    flex-wrap: wrap;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #1e1e1e;
    padding: 4px;
    gap: 4px;
    z-index: 9999;
    justify-content: center;
    border-top: 1px solid #444;
    -webkit-user-select: none;
    user-select: none;
    padding-bottom: calc(4px + env(safe-area-inset-bottom));
  }
  #mobile-toolbar button {
    background: #2d2d2d;
    color: #e6e6e6;
    border: 1px solid #555;
    border-radius: 6px;
    padding: 8px 10px;
    font-family: Menlo, "DejaVu Sans Mono", monospace;
    font-size: 14px;
    min-width: 44px;
    min-height: 36px;
    touch-action: manipulation;
  }
  #mobile-toolbar button:active { background: #555; }
  #terminal-container { padding-bottom: 110px !important; }
}
</style>
<script>
(function () {
  var OrigWS = window.WebSocket;
  var capturedWs = null;
  window.WebSocket = new Proxy(OrigWS, {
    construct: function (target, args) {
      capturedWs = new target(args[0], args[1]);
      return capturedWs;
    }
  });

  function send(seq) {
    if (!capturedWs || capturedWs.readyState !== 1) return;
    var bytes = new TextEncoder().encode(seq);
    var payload = new Uint8Array(bytes.length + 1);
    payload[0] = 0x30; // '0' — ttyd INPUT opcode
    payload.set(bytes, 1);
    capturedWs.send(payload);
  }

  // Paste large payloads in chunks so tmux's input buffer doesn't drop bytes.
  function sendChunked(text, chunkSize, delayMs, onDone) {
    var i = 0;
    function next() {
      if (i >= text.length) { if (onDone) onDone(); return; }
      var end = Math.min(i + chunkSize, text.length);
      send(text.slice(i, end));
      i = end;
      setTimeout(next, delayMs);
    }
    next();
  }

  function shellSingleQuote(s) {
    return "'" + String(s).replace(/'/g, "'\\''") + "'";
  }

  // Zmodem is unreliable through tmux (not 8-bit clean in UTF-8 mode). Instead,
  // base64-encode the file in the browser and paste a heredoc into the shell.
  // Works through any terminal multiplexer, no rz/sz needed.
  function handleUpload(file, btn) {
    var reader = new FileReader();
    reader.onload = function () {
      var result = reader.result;
      var b64 = result.substring(result.indexOf(',') + 1);
      var wrapped = b64.replace(/(.{76})/g, '$1\n');
      if (wrapped.charAt(wrapped.length - 1) !== '\n') wrapped += '\n';
      var term = 'UPLOAD_END_' + Math.random().toString(36).slice(2, 10).toUpperCase();
      var qname = shellSingleQuote(file.name);
      var origLabel = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'sending…';
      var cmd =
        "cat > /tmp/_u.b64 <<'" + term + "'\n" +
        wrapped +
        term + "\n" +
        "base64 -d /tmp/_u.b64 > " + qname +
        " && rm /tmp/_u.b64 && echo \"uploaded $(wc -c < " + qname + ") bytes to " + qname + "\"\n";
      sendChunked(cmd, 4096, 10, function () {
        btn.disabled = false;
        btn.textContent = origLabel;
      });
    };
    reader.onerror = function () {
      btn.disabled = false;
      alert('upload failed: ' + reader.error);
    };
    reader.readAsDataURL(file);
  }

  var keys = [
    ["Esc", "\x1b"],
    ["Tab", "\t"],
    ["^C", "\x03"],
    ["^D", "\x04"],
    ["^L", "\x0c"],
    ["C-b", "\x02"],
    // C-b [ = enter tmux copy-mode; swipe or arrows to scroll, q to exit
    ["scroll", "\x02["],
    ["[q]", "q"],
    ["|", "|"],
    ["/", "/"],
    ["~", "~"],
    ["-", "-"],
    ["\u2191", "\x1b[A"],
    ["\u2193", "\x1b[B"],
    ["\u2190", "\x1b[D"],
    ["\u2192", "\x1b[C"]
  ];

  function build() {
    if (document.getElementById("mobile-toolbar")) return;
    var bar = document.createElement("div");
    bar.id = "mobile-toolbar";

    // Upload button — opens a hidden <input type=file> and pastes a base64
    // heredoc into the shell. The file lands in the current working directory.
    var upBtn = document.createElement("button");
    upBtn.type = "button";
    upBtn.textContent = "file";
    upBtn.className = "upload";
    var fileInput = document.createElement("input");
    fileInput.type = "file";
    fileInput.style.display = "none";
    fileInput.addEventListener("change", function () {
      if (fileInput.files && fileInput.files[0]) {
        handleUpload(fileInput.files[0], upBtn);
        fileInput.value = "";
      }
    });
    upBtn.addEventListener("click", function () {
      if (!upBtn.disabled) fileInput.click();
    });
    bar.appendChild(upBtn);
    bar.appendChild(fileInput);

    keys.forEach(function (k) {
      var b = document.createElement("button");
      b.type = "button";
      b.textContent = k[0];
      var seq = k[1];
      var fired = false;
      b.addEventListener("touchstart", function (e) {
        e.preventDefault();
        fired = true;
        send(seq);
      }, { passive: false });
      b.addEventListener("click", function () {
        if (fired) { fired = false; return; }
        send(seq);
      });
      bar.appendChild(b);
    });
    document.body.appendChild(bar);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", build);
  } else {
    build();
  }
})();
</script>
