<style>
#mobile-toolbar { display: none; }
@media (pointer: coarse), (max-width: 800px) {
  #mobile-toolbar {
    display: flex;
    flex-wrap: wrap;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #1e1e1e;
    padding: 4px;
    gap: 4px;
    z-index: 9999;
    justify-content: center;
    border-top: 1px solid #444;
    -webkit-user-select: none;
    user-select: none;
    padding-bottom: calc(4px + env(safe-area-inset-bottom));
  }
  #mobile-toolbar button {
    background: #2d2d2d;
    color: #e6e6e6;
    border: 1px solid #555;
    border-radius: 6px;
    padding: 8px 10px;
    font-family: Menlo, "DejaVu Sans Mono", monospace;
    font-size: 14px;
    min-width: 44px;
    min-height: 36px;
    touch-action: manipulation;
  }
  #mobile-toolbar button:active { background: #555; }
  #mobile-toolbar.top {
    bottom: auto;
    top: 0;
    border-top: none;
    border-bottom: 1px solid #444;
    padding-bottom: 4px;
    padding-top: calc(4px + env(safe-area-inset-top));
  }
  #terminal-container { padding-bottom: 110px !important; }
  body.toolbar-top #terminal-container {
    padding-bottom: 0 !important;
    padding-top: 110px !important;
  }
}
</style>
<script>
(function () {
  var OrigWS = window.WebSocket;
  var capturedWs = null;
  window.WebSocket = new Proxy(OrigWS, {
    construct: function (target, args) {
      capturedWs = new target(args[0], args[1]);
      return capturedWs;
    }
  });

  function send(seq) {
    if (!capturedWs || capturedWs.readyState !== 1) return false;
    var bytes = new TextEncoder().encode(seq);
    var payload = new Uint8Array(bytes.length + 1);
    payload[0] = 0x30; // '0' — ttyd INPUT opcode
    payload.set(bytes, 1);
    capturedWs.send(payload);
    return true;
  }

  // The HA mobile app suspends the web view when the native file picker is
  // open. ttyd's WebSocket times out and closes. When the picker closes HA
  // reconnects ttyd, which creates a new WebSocket — our Proxy catches it and
  // updates capturedWs. But that reconnect isn't instant. Any send attempted
  // mid-reconnect is silently dropped, which is why multi-file uploads fail
  // after the first pick. This helper retries until the new socket is open,
  // then sends. 30 s timeout guards against a truly dead connection.
  function sendWhenReady(seq, onDone, onFail) {
    var deadline = Date.now() + 30000;
    function attempt() {
      if (send(seq)) { if (onDone) onDone(); return; }
      if (Date.now() > deadline) { if (onFail) onFail(); return; }
      setTimeout(attempt, 200);
    }
    attempt();
  }

  // Paste large payloads in chunks so tmux's input buffer doesn't drop bytes.
  // Every chunk waits for the WS to be connected, so a reconnect mid-paste
  // pauses the upload instead of losing data.
  function sendChunked(text, chunkSize, delayMs, onDone, onFail) {
    var i = 0;
    function next() {
      if (i >= text.length) { if (onDone) onDone(); return; }
      var end = Math.min(i + chunkSize, text.length);
      var chunk = text.slice(i, end);
      sendWhenReady(chunk, function () {
        i = end;
        setTimeout(next, delayMs);
      }, onFail);
    }
    next();
  }

  function shellSingleQuote(s) {
    return "'" + String(s).replace(/'/g, "'\\''") + "'";
  }

  // Zmodem is unreliable through tmux (not 8-bit clean in UTF-8 mode). Instead,
  // base64-encode the file in the browser and paste a heredoc into the shell.
  // Works through any terminal multiplexer, no rz/sz needed.
  //
  // readAsDataURL on the whole file fails for big media on mobile: iOS videos
  // from the Photos picker can resolve with empty bytes (lazy transcode), and
  // >~50 MB files blow the JS string / memory budget silently. Slice the file
  // into small pieces, read each as ArrayBuffer, base64 it, and append to a
  // temp buffer on disk, then decode once at the end.

  function bytesToBase64(bytes) {
    var chunkSize = 0x8000; // 32 KB — avoids stack overflow from .apply()
    var binary = '';
    for (var i = 0; i < bytes.length; i += chunkSize) {
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
    }
    return btoa(binary);
  }

  function readSliceAsBytes(file, start, end, onDone, onError) {
    var reader = new FileReader();
    reader.onload = function () { onDone(new Uint8Array(reader.result)); };
    reader.onerror = function () { onError(reader.error); };
    reader.readAsArrayBuffer(file.slice(start, end));
  }

  function uploadOne(file, onProgress, onDone, onError) {
    if (!file.size) {
      onError('file is empty or not yet available (on iOS, Photos videos may need a moment to download — try again)');
      return;
    }

    var SLICE = 3 * 1024 * 1024; // 3 MB per read — ~4 MB base64, safe in memory
    var tmpPath = '/tmp/_u.' + Math.random().toString(36).slice(2, 10) + '.b64';
    var qtmp = shellSingleQuote(tmpPath);
    var qname = shellSingleQuote(file.name);
    var offset = 0;

    var failed = false;
    function fail(msg) {
      if (failed) return;
      failed = true;
      // Best-effort cleanup of the temp buffer
      send("rm -f " + qtmp + "\n");
      onError(msg);
    }
    function disc() { fail('terminal disconnected — reopen the addon and try again'); }

    // Truncate the temp buffer, then append each chunk, then decode and clean.
    sendChunked(": > " + qtmp + "\n", 4096, 10, function () {
      nextChunk();
    }, disc);

    function nextChunk() {
      if (failed) return;
      if (offset >= file.size) {
        var finalCmd =
          "base64 -d " + qtmp + " > " + qname +
          " && rm -f " + qtmp +
          " && echo \"uploaded $(wc -c < " + qname + ") bytes to " + qname + "\"\n";
        sendChunked(finalCmd, 4096, 10, onDone, disc);
        return;
      }
      var end = Math.min(offset + SLICE, file.size);
      readSliceAsBytes(file, offset, end, function (bytes) {
        if (!bytes.length) { fail('read 0 bytes from file — it may not be available yet'); return; }
        var b64 = bytesToBase64(bytes);
        var wrapped = b64.replace(/(.{76})/g, '$1\n');
        if (wrapped.charAt(wrapped.length - 1) !== '\n') wrapped += '\n';
        var term = 'UPLOAD_END_' + Math.random().toString(36).slice(2, 10).toUpperCase();
        var cmd = "cat >> " + qtmp + " <<'" + term + "'\n" + wrapped + term + "\n";
        sendChunked(cmd, 4096, 10, function () {
          offset = end;
          if (onProgress) onProgress(offset, file.size);
          setTimeout(nextChunk, 50);
        }, disc);
      }, function (err) { fail('read failed: ' + err); });
    }
  }

  function handleUpload(files, btn) {
    var list = Array.prototype.slice.call(files);
    if (!list.length) return;
    var origLabel = btn.textContent;
    btn.disabled = true;
    var idx = 0;
    function prefix() { return list.length > 1 ? (idx + 1) + '/' + list.length + ' ' : ''; }
    function next() {
      if (idx >= list.length) {
        btn.textContent = origLabel;
        btn.disabled = false;
        return;
      }
      btn.textContent = prefix() + 'sending…';
      uploadOne(list[idx], function (sent, total) {
        var pct = Math.min(99, Math.floor(sent / total * 100));
        btn.textContent = prefix() + pct + '%';
      }, function () {
        idx++;
        // brief gap so the prior command's echo lands before the next paste
        setTimeout(next, 400);
      }, function (err) {
        btn.textContent = origLabel;
        btn.disabled = false;
        alert('upload failed: ' + err);
      });
    }
    next();
  }

  var keys = [
    ["Esc", "\x1b"],
    ["Tab", "\t"],
    ["^C", "\x03"],
    ["^D", "\x04"],
    ["^L", "\x0c"],
    ["C-b", "\x02"],
    // C-b [ = enter tmux copy-mode; swipe or arrows to scroll, q to exit
    ["scroll", "\x02["],
    ["[q]", "q"],
    ["|", "|"],
    ["/", "/"],
    ["~", "~"],
    ["-", "-"],
    ["\u2191", "\x1b[A"],
    ["\u2193", "\x1b[B"],
    ["\u2190", "\x1b[D"],
    ["\u2192", "\x1b[C"]
  ];

  function build() {
    if (document.getElementById("mobile-toolbar")) return;
    var bar = document.createElement("div");
    bar.id = "mobile-toolbar";

    // Restore saved toolbar position (top/bottom) from a prior session.
    var savedPos = null;
    try { savedPos = localStorage.getItem('lh-toolbar-pos'); } catch (e) {}
    if (savedPos === 'top') {
      bar.classList.add('top');
      document.body.classList.add('toolbar-top');
    }

    // Upload button — opens a hidden <input type=file multiple> and pastes a
    // base64 heredoc into the shell for each file. Files land in cwd.
    var upBtn = document.createElement("button");
    upBtn.type = "button";
    upBtn.textContent = "file";
    upBtn.className = "upload";
    var fileInput = document.createElement("input");
    fileInput.type = "file";
    fileInput.multiple = true;
    fileInput.style.display = "none";
    fileInput.addEventListener("change", function () {
      if (fileInput.files && fileInput.files.length) {
        handleUpload(fileInput.files, upBtn);
        fileInput.value = "";
      }
    });
    upBtn.addEventListener("click", function () {
      if (!upBtn.disabled) fileInput.click();
    });
    bar.appendChild(upBtn);
    bar.appendChild(fileInput);

    // Position-flip button — toggle toolbar between bottom and top.
    var posBtn = document.createElement("button");
    posBtn.type = "button";
    posBtn.textContent = "\u2195"; // ↕
    posBtn.addEventListener("click", function () {
      var nowTop = !bar.classList.contains('top');
      bar.classList.toggle('top', nowTop);
      document.body.classList.toggle('toolbar-top', nowTop);
      try { localStorage.setItem('lh-toolbar-pos', nowTop ? 'top' : 'bottom'); } catch (e) {}
    });
    bar.appendChild(posBtn);

    keys.forEach(function (k) {
      var b = document.createElement("button");
      b.type = "button";
      b.textContent = k[0];
      var seq = k[1];
      var fired = false;
      b.addEventListener("touchstart", function (e) {
        e.preventDefault();
        fired = true;
        send(seq);
      }, { passive: false });
      b.addEventListener("click", function () {
        if (fired) { fired = false; return; }
        send(seq);
      });
      bar.appendChild(b);
    });
    document.body.appendChild(bar);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", build);
  } else {
    build();
  }
})();
</script>
